<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Sync — Safari ↔ Edge 书签同步工具</title>
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a2e; --surface2: #16213e;
  --border: #2a2a4a; --text: #e0e0e0; --text2: #888;
  --accent: #4361ee; --accent2: #3a86ff;
  --green: #06d6a0; --orange: #f77f00; --red: #ef476f; --purple: #b388ff; --blue: #48bfe3;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 工具栏 */
.toolbar { padding:6px 10px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.toolbar-row { display:flex; align-items:center; gap:4px; padding:2px 0; }
.toolbar .title { font-size:13px; font-weight:600; margin-right:6px; white-space:nowrap; }
.toolbar .sep { width:1px; height:18px; background:var(--border); margin:0 2px; }
.btn { padding:4px 10px; border:1px solid var(--border); border-radius:5px; background:var(--surface2); color:var(--text); font-size:12px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn:hover { background:var(--accent); border-color:var(--accent); }
.btn:disabled { opacity:.35; cursor:default; background:var(--surface2); border-color:var(--border); }
.btn.sm { padding:2px 7px; font-size:11px; }
.btn.danger { border-color:var(--red); color:var(--red); }
.btn.danger:hover { background:var(--red); color:#fff; }

/* 拖拽区 */
.drop-zone { display:flex; gap:8px; padding:8px 10px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.drop-box { flex:1; border:2px dashed var(--border); border-radius:8px; padding:10px; text-align:center; cursor:pointer; transition:all .2s; min-height:52px; display:flex; flex-direction:column; justify-content:center; }
.drop-box:hover, .drop-box.drag-over { border-color:var(--accent); background:rgba(67,97,238,.06); }
.drop-box.loaded { border-color:var(--green); border-style:solid; }
.drop-box .icon { font-size:18px; }
.drop-box .label { font-size:12px; color:var(--text2); }
.drop-box .count { font-size:11px; color:var(--green); margin-top:1px; }
.drop-box input { display:none; }

/* 搜索 */
.search-bar { display:flex; gap:6px; padding:5px 10px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.search-bar input { flex:1; padding:4px 10px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text); font-size:12px; outline:none; }
.search-bar input:focus { border-color:var(--accent); }

/* 主区域 */
.main { flex:1; display:flex; overflow:hidden; }
.panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.panel + .panel { border-left:1px solid var(--border); }
.panel-header { padding:5px 10px; background:var(--surface); border-bottom:1px solid var(--border); font-size:12px; font-weight:600; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; gap:4px; }
.panel-header .badge { font-size:10px; padding:1px 7px; border-radius:8px; background:var(--surface2); color:var(--text2); font-weight:400; }
.panel-header .tools { display:flex; gap:3px; }

/* 树视图 */
.tree-container { flex:1; overflow-y:auto; padding:2px 0; }
.tree-container::-webkit-scrollbar { width:5px; }
.tree-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.tree-item { display:flex; align-items:center; padding:2px 6px 2px 0; cursor:pointer; font-size:12px; line-height:1.5; user-select:none; transition:background .1s; }
.tree-item:hover { background:rgba(255,255,255,.04); }
.tree-item.selected { background:rgba(67,97,238,.15); }
.tree-item.checked { background:rgba(239,71,111,.1); }
.tree-item .cb { width:13px; height:13px; margin-right:3px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.tree-item .arrow { width:14px; text-align:center; font-size:9px; color:var(--text2); flex-shrink:0; transition:transform .15s; }
.tree-item .arrow.open { transform:rotate(90deg); }
.tree-item .icon { margin-right:4px; font-size:12px; flex-shrink:0; }
.tree-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tree-item .tag { font-size:9px; padding:0 5px; border-radius:6px; margin-left:4px; flex-shrink:0; }
.tag-safari-only { background:rgba(247,127,0,.15); color:var(--orange); }
.tag-edge-only { background:rgba(72,191,227,.15); color:var(--blue); }
.tag-both { background:rgba(6,214,160,.1); color:var(--green); }
.tag-diff { background:rgba(179,136,255,.15); color:var(--purple); }
.tag-dup { background:rgba(239,71,111,.15); color:var(--red); }
.tree-item .count { font-size:10px; color:var(--text2); margin-left:4px; flex-shrink:0; }

/* 状态栏 */
.statusbar { padding:4px 10px; background:var(--surface); border-top:1px solid var(--border); font-size:11px; color:var(--text2); flex-shrink:0; display:flex; justify-content:space-between; }

/* 弹窗 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-overlay.active { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; min-width:380px; max-width:600px; max-height:80vh; overflow-y:auto; }
.modal h3 { margin-bottom:12px; font-size:14px; }
.modal label { display:block; font-size:12px; color:var(--text2); margin-bottom:3px; margin-top:10px; }
.modal input, .modal select { width:100%; padding:6px 10px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text); font-size:12px; outline:none; }
.modal input:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:16px; }

/* 映射表 */
.mapping-table { width:100%; border-collapse:collapse; font-size:12px; }
.mapping-table th { text-align:left; padding:4px 6px; color:var(--text2); font-weight:500; border-bottom:1px solid var(--border); }
.mapping-table td { padding:3px 6px; border-bottom:1px solid rgba(255,255,255,.03); vertical-align:middle; }
.mapping-table select { width:100%; padding:3px 6px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); font-size:11px; }
.mapping-arrow { color:var(--accent); font-weight:bold; text-align:center; }

/* 右键菜单 */
.ctx-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:3px 0; min-width:140px; z-index:200; display:none; box-shadow:0 6px 20px rgba(0,0,0,.4); }
.ctx-menu.active { display:block; }
.ctx-item { padding:5px 14px; font-size:12px; cursor:pointer; }
.ctx-item:hover { background:rgba(67,97,238,.15); }
.ctx-sep { height:1px; background:var(--border); margin:3px 0; }
</style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="toolbar-row">
    <span class="title">🔖 Bookmark Sync</span>
    <div class="sep"></div>
    <button class="btn" onclick="doCompare()" id="btnCompare" disabled>🔍 对比</button>
    <button class="btn" onclick="openFolderMapping()" id="btnMapping" disabled>📂 映射</button>
    <div class="sep"></div>
    <button class="btn" onclick="syncS2E()" id="btnS2E" disabled>Safari→Edge</button>
    <button class="btn" onclick="syncE2S()" id="btnE2S" disabled>Safari←Edge</button>

    <div class="sep"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜索书签名称或 URL..." oninput="doSearch(this.value)">

<!-- 双栏 -->
<div class="main">
  <div class="panel">

      🧭 Safari <span class="badge" id="safariBadge">未加载</span>
      <div class="tools">
        <button class="btn sm" onclick="sortBookmarks('safari')">↕ 排序</button>

        <button class="btn sm" onclick="downloadSafari()" id="btnSaveSafari" disabled>💾 保存</button>
        <button class="btn sm" onclick="doBackup('safari')" id="btnBackupSafari" disabled>⏪ 备份</button>

      🌐 Edge <span class="badge" id="edgeBadge">未加载</span>
      <div class="tools">
        <button class="btn sm" onclick="sortBookmarks('edge')">↕ 排序</button>
        <button class="btn sm danger" onclick="delEdgeOnly()" id="btnDelES" disabled>✂ 删独有</button>
        <button class="btn sm" onclick="syncCheckedToSafari()" id="btnSyncToSafari" disabled>📋 同步到Safari</button>

<!-- 状态栏 -->
<div class="statusbar">

<!-- 编辑弹窗 -->

<!-- 映射弹窗 -->

<!-- 关于弹窗 -->
<div class="modal-overlay" id="aboutModal">
  <div class="modal" style="text-align:center;min-width:340px;">
    <h3 style="font-size:18px;margin-bottom:6px;">🔖 Bookmark Sync</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Safari ↔ Edge 书签同步工具</p>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">
      <div>版本: 1.0.0</div>

      <button class="btn" onclick="document.getElementById('aboutModal').classList.remove('active')">关闭</button>

<!-- 右键菜单 -->

  <div class="ctx-item" onclick="ctxAction('addFolder')">📁 添加文件夹</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('delete')">🗑 删除</div>
</div>

<script>
// ═══════ 全局状态 ═══════
let safariData = null, edgeData = null, edgeRaw = null, diffResult = null;
let safariUrlSet = new Set(), edgeUrlSet = new Set();
let folderMapping = {};
let ctxTarget = null, editTarget = null;
let dirty = false;
function setDirty(v){dirty=v;if(getIsPywebview())try{window.pywebview.api.set_dirty(v);}catch(e){}}

// ═══════ Binary Plist 解析器 ═══════
function parseBplist(buffer) {
  const view = new DataView(buffer), bytes = new Uint8Array(buffer);
  const magic = String.fromCharCode(...bytes.slice(0, 8));
  if (!magic.startsWith('bplist')) throw new Error('不是 binary plist');
  const tOff = buffer.byteLength - 32;
  const oIS = bytes[tOff+6], oRS = bytes[tOff+7];
  const nObj = Number(view.getBigUint64(tOff+8)), topObj = Number(view.getBigUint64(tOff+16));
  const otOff = Number(view.getBigUint64(tOff+24));
  const offsets = [];
  for (let i = 0; i < nObj; i++) { let o=0; for(let j=0;j<oIS;j++) o=o*256+bytes[otOff+i*oIS+j]; offsets.push(o); }
  function rVI(p) { const m=bytes[p],l=1<<(m&0xf); let v=0; for(let i=0;i<l;i++) v=v*256+bytes[p+1+i]; return{value:v,size:1+l}; }
  function parse(idx) {
    const p=offsets[idx], mk=bytes[p], tp=(mk>>4)&0xf; let cnt=mk&0xf, hs=1;
    if(cnt===0xf){const v=rVI(p+1);cnt=v.value;hs=1+v.size;}
    switch(tp) {
      case 0: return cnt===8?false:cnt===9?true:null;
      case 1: { let v=0; const l=1<<cnt; for(let i=0;i<l;i++) v=v*256+bytes[p+1+i]; return v; }
      case 2: { const l=1<<cnt; return l===4?view.getFloat32(p+1):view.getFloat64(p+1); }
      case 3: return new Date((view.getFloat64(p+1)+978307200)*1000);
      case 4: return bytes.slice(p+hs,p+hs+cnt);
      case 5: { let s=''; for(let i=0;i<cnt;i++) s+=String.fromCharCode(bytes[p+hs+i]); return s; }
      case 6: { let s=''; for(let i=0;i<cnt;i++) s+=String.fromCharCode(view.getUint16(p+hs+i*2,false)); return s; }
      case 8: return cnt+1;
      case 0xa: case 0xc: { const a=[]; for(let i=0;i<cnt;i++){let r=0;for(let j=0;j<oRS;j++)r=r*256+bytes[p+hs+i*oRS+j];a.push(parse(r));} return a; }
      case 0xd: { const o={}; const ks=p+hs,vs=ks+cnt*oRS; for(let i=0;i<cnt;i++){let kr=0,vr=0;for(let j=0;j<oRS;j++){kr=kr*256+bytes[ks+i*oRS+j];vr=vr*256+bytes[vs+i*oRS+j];}const k=parse(kr),v=parse(vr);if(typeof k==='string')o[k]=v;} return o; }
      default: return null;
    }
  }
  return parse(topObj);
}

// ═══════ 书签转换 ═══════
function convertSafariNode(n, pp) {
  if(!n) return{name:'',url:'',children:[],path:''};
  const t=n.WebBookmarkType||'';
  if(t==='WebBookmarkTypeLeaf') return{name:(n.URIDictionary&&n.URIDictionary.title)||n.URLString||'',url:n.URLString||'',children:[],path:pp||''};
  if(t==='WebBookmarkTypeList'){const ti=n.Title||'',p=pp?pp+'/'+ti:ti;return{name:ti,url:'',path:p,children:(n.Children||[]).map(c=>convertSafariNode(c,p))};}
  if(t==='WebBookmarkTypeProxy') return{name:'Safari',url:'',path:'',children:(n.Children||[]).map(c=>convertSafariNode(c,''))};
  return{name:'',url:'',children:[],path:''};
}
function convertEdgeNode(n, pp) {
  const nm=n.name||'', p=pp?pp+'/'+nm:nm;
  if(n.type==='url') return{name:nm,url:n.url||'',children:[],path:pp};
  return{name:nm,url:'',path:p,children:(n.children||[]).map(c=>convertEdgeNode(c,p))};
}
function parseEdgeJSON(text) {
  const d=typeof text==='string'?JSON.parse(text):text, r=d.roots||{};
  const root={name:'Edge',url:'',children:[],path:''};
  const nm={bookmark_bar:'收藏夹栏',other:'其他收藏夹',synced:'移动设备收藏夹'};
  for(const[k,l]of Object.entries(nm)) if(r[k]){const n=convertEdgeNode(r[k],'');n.name=l;n.path=l;root.children.push(n);}
  return{root,raw:d};
}

// ═══════ 工具函数 ═══════
function normUrl(u){if(!u)return'';try{const p=new URL(u);return(p.origin+p.pathname).replace(/\/$/,'')+(p.search||'');}catch{return u.trim();}}
function countBookmarks(n){if(n.url)return 1;return n.children.reduce((s,c)=>s+countBookmarks(c),0);}
function countFolders(n){if(n.url)return 0;return 1+n.children.reduce((s,c)=>s+countFolders(c),0);}
function collectUrls(n,p){const r={};if(n.url){const k=normUrl(n.url);if(k)r[k]={title:n.name,url:n.url,path:p||n.path};}const cp=p?p+'/'+n.name:n.name;for(const c of n.children)Object.assign(r,collectUrls(c,cp));return r;}
function flatten(n,p){const r=[];if(n.url)r.push({url:n.url,title:n.name,path:p||n.path});const cp=p?p+'/'+n.name:n.name;for(const c of n.children)r.push(...flatten(c,cp));return r;}
function findNode(root,url){if(normUrl(root.url)===normUrl(url))return root;for(const c of root.children){const f=findNode(c,url);if(f)return f;}return null;}
function findByName(root,name){for(const c of root.children){if(c.name===name)return c;if(c.children.length){const f=findByName(c,name);if(f)return f;}}return null;}
function findFolder(root,path){if(!path)return root;const parts=path.split('/').filter(Boolean);let cur=root;for(const p of parts){const c=cur.children.find(x=>x.name===p&&!x.url);if(!c)return null;cur=c;}return cur;}
function deleteNode(root,target){for(let i=0;i<root.children.length;i++){if(root.children[i]===target){root.children.splice(i,1);return true;}if(deleteNode(root.children[i],target))return true;}return false;}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stripRootPrefix(p){if(!p)return'';const i=p.indexOf('/');if(i>0){const r=p.substring(0,i);if(r==='Safari'||r==='Edge')return p.substring(i+1);}return p;}

// ═══════ 文件处理 ═══════
function handleFile(input,type){const f=input.files[0];if(f)processFile(f,type);}
function processFile(file,type){
  const reader=new FileReader();
  if(type==='safari'){reader.onload=e=>{try{safariData=convertSafariNode(parseBplist(e.target.result),'');const bm=countBookmarks(safariData);document.getElementById('safariCount').textContent=`${bm}条,${countFolders(safariData)}个文件夹`;document.getElementById('dropSafari').classList.add('loaded');document.getElementById('safariBadge').textContent=`${bm}条`;document.getElementById('safariLabel').textContent='✅ Safari已加载';refreshUI();}catch(err){alert('Safari解析失败:'+err.message);}};reader.readAsArrayBuffer(file);}
  else{reader.onload=e=>{try{const r=parseEdgeJSON(e.target.result);edgeData=r.root;edgeRaw=r.raw;const bm=countBookmarks(edgeData);document.getElementById('edgeCount').textContent=`${bm}条,${countFolders(edgeData)}个文件夹`;document.getElementById('dropEdge').classList.add('loaded');document.getElementById('edgeBadge').textContent=`${bm}条`;document.getElementById('edgeLabel').textContent='✅ Edge已加载';refreshUI();}catch(err){alert('Edge解析失败:'+err.message);}};reader.readAsText(file);}
}
['dropSafari','dropEdge'].forEach(id=>{const el=document.getElementById(id),tp=id==='dropSafari'?'safari':'edge';el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)processFile(f,tp);});});

// ═══════ 对比 ═══════
function doCompare(){
  if(!safariData||!edgeData)return;
  const sU=collectUrls(safariData,''),eU=collectUrls(edgeData,'');
  const sK=new Set(Object.keys(sU)),eK=new Set(Object.keys(eU));
  const safariOnly=[],edgeOnly=[],both=[],titleDiffs=[];
  const safariOnlyUrls=new Set(),edgeOnlyUrls=new Set(),bothUrls=new Set(),titleDiffUrls=new Set();
  for(const k of sK)if(!eK.has(k)){safariOnly.push({...sU[k],normKey:k});safariOnlyUrls.add(k);}
  for(const k of eK)if(!sK.has(k)){edgeOnly.push({...eU[k],normKey:k});edgeOnlyUrls.add(k);}
  for(const k of sK)if(eK.has(k)){both.push({...sU[k],edgeTitle:eU[k].title,normKey:k});bothUrls.add(k);if(sU[k].title!==eU[k].title){titleDiffs.push({...sU[k],edgeTitle:eU[k].title,normKey:k});titleDiffUrls.add(k);}}
  const dupUrls=new Set();for(const src of[safariData,edgeData]){const a=flatten(src,''),seen={};for(const b of a){const k=normUrl(b.url);seen[k]=(seen[k]||0)+1;if(seen[k]>1)dupUrls.add(k);}}
  diffResult={safariOnly,edgeOnly,both,titleDiffs,safariOnlyUrls,edgeOnlyUrls,bothUrls,titleDiffUrls,dupUrls,safariDups:findDups(safariData),edgeDups:findDups(edgeData)};
  refreshUI();
  const msg=`Safari独有:${safariOnly.length} | Edge独有:${edgeOnly.length} | 共有:${both.length} | 标题不同:${titleDiffs.length}`;
  document.getElementById('diffText').textContent=msg;setStatus('对比完成 — '+msg);
  document.getElementById('btnS2E').disabled=safariOnly.length===0;
  document.getElementById('btnE2S').disabled=edgeOnly.length===0;
  document.getElementById('btnAll').disabled=safariOnly.length===0&&edgeOnly.length===0;
}
function findDups(root){const a=flatten(root,''),g={};for(const b of a){const k=normUrl(b.url);if(!g[k])g[k]=[];g[k].push(b);}return Object.values(g).filter(x=>x.length>1);}

// ═══════ 同步（含文件夹同步） ═══════
function ensureFolder(root,path){
  if(!path)return root;const parts=path.split('/').filter(Boolean);if(!parts.length)return root;
  let cur=root,start=0;
  const rm=root.children.find(c=>c.name===parts[0]&&!c.url);
  if(rm){cur=rm;start=1;}else{cur=root.children.find(c=>!c.url)||root;}
  for(let i=start;i<parts.length;i++){let ch=cur.children.find(c=>c.name===parts[i]&&!c.url);if(!ch){ch={name:parts[i],url:'',children:[],path:''};cur.children.push(ch);}cur=ch;}
  return cur;
}
function syncFolders(srcRoot,dstRoot,mapping,reverse){
  // 同步空文件夹结构
  function walkSrc(srcNode,dstPath){
    for(const c of srcNode.children){
      if(!c.url){// 文件夹
        let targetName=c.name, targetPath=dstPath?dstPath+'/'+targetName:targetName;
        // 应用映射
        if(!reverse&&mapping&&Object.keys(mapping).length){
          const mp=getMappedFolder(c.path||c.name);
          if(mp) targetPath=mp;
        }
        if(!findFolder(dstRoot,targetPath)) ensureFolder(dstRoot,targetPath);
        walkSrc(c,targetPath);
      }
    }
  }
  walkSrc(srcRoot,'');
}
function syncS2E(){
  if(!diffResult||!diffResult.safariOnly.length)return;
  const hm=Object.keys(folderMapping).length>0;
  if(!confirm(`同步 ${diffResult.safariOnly.length} 条Safari独有书签到Edge？${hm?'\n\n映射: '+JSON.stringify(folderMapping):''}`))return;
  // 先同步文件夹结构
  syncFolders(safariData,edgeData,folderMapping,false);
  let synced=0;
  for(const item of diffResult.safariOnly){
    const src=findNode(safariData,item.url);if(!src)continue;if(findNode(edgeData,item.url))continue;
    let tp=hm?(getMappedFolder(item.path)||item.path):item.path;tp=stripRootPrefix(tp);
    let f=findFolder(edgeData,tp);if(!f)f=ensureFolder(edgeData,tp);
    f.children.push(JSON.parse(JSON.stringify(src)));synced++;
  }
  refreshCounts();doCompare();setStatus(`✅ Safari→Edge: ${synced}条${hm?' (使用映射)':''}`);setDirty(true);
}
function syncE2S(){
  if(!diffResult||!diffResult.edgeOnly.length)return;
  const hm=Object.keys(folderMapping).length>0;
  const rev={};for(const[s,e]of Object.entries(folderMapping))rev[e]=s;
  if(!confirm(`Safari←Edge: 同步 ${diffResult.edgeOnly.length} 条Edge独有书签到Safari？${hm?'\n\n(已配置映射)':''}`))return;
  syncFolders(edgeData,safariData,rev,true);
  let synced=0;
  for(const item of diffResult.edgeOnly){
    const src=findNode(edgeData,item.url);if(!src)continue;if(findNode(safariData,item.url))continue;
    let tp=stripRootPrefix(item.path);
    if(hm)for(const[eP,sP]of Object.entries(rev)){if(tp===eP||tp.startsWith(eP+'/')){tp=sP+tp.slice(eP.length);break;}}
    let f=findFolder(safariData,tp);if(!f)f=ensureFolder(safariData,tp);
    f.children.push(JSON.parse(JSON.stringify(src)));synced++;
  }
  refreshCounts();doCompare();setStatus(`✅ Safari←Edge: ${synced}条${hm?' (使用映射)':''}`);setDirty(true);
}

  const km={'收藏夹栏':'bookmark_bar','其他收藏夹':'other','移动设备收藏夹':'synced'};
  for(const c of edgeData.children){const k=km[c.name];if(k&&d.roots[k])d.roots[k]=toEdgeNode(c);}
  if(getIsPywebview()){try{const r=JSON.parse(await window.pywebview.api.save_edge(JSON.stringify(d)));if(r.ok){setDirty(false);setStatus('✅ Edge已保存(备份:'+r.backup+')');alert('Edge书签已保存！\n备份:'+r.backup);}else alert('保存失败:'+r.error);}catch(e){alert(e);}}
  else{const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});dlBlob(b,'Bookmarks');}
}
async function downloadSafari(){
  if(!safariData)return;
  const pd=toSafariPlist(safariData);
  if(getIsPywebview()){try{const r=JSON.parse(await window.pywebview.api.save_safari(JSON.stringify(pd)));if(r.ok){setDirty(false);setStatus('✅ Safari已保存(备份:'+r.backup+')');alert('Safari书签已保存！\n请重启Safari。\n备份:'+r.backup);}else alert('保存失败:'+r.error);}catch(e){alert(e);}}
  else{const lines=['<!DOCTYPE NETSCAPE-Bookmark-file-1>','<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">','<TITLE>Bookmarks</TITLE>','<H1>Bookmarks</H1>','<DL><p>'];function add(n){if(n.url)lines.push(`    <DT><A HREF="${escHtml(n.url)}">${escHtml(n.name)}</A>`);else if(n.children.length){lines.push(`    <DT><H3>${escHtml(n.name)}</H3>`);lines.push('    <DL><p>');n.children.forEach(add);lines.push('    </DL><p>');}}safariData.children.forEach(add);lines.push('</DL><p>');const b=new Blob([lines.join('\n')],{type:'text/html'});dlBlob(b,'Safari_Bookmarks.html');}
}
function dlBlob(b,n){const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href);}

// ═══════ 备份恢复 ═══════
async function restoreBackup(){
  if(!getIsPywebview()){alert('备份恢复仅在桌面应用中可用');return;}
  try{
    const r=JSON.parse(await window.pywebview.api.list_backups());
    if(!r.backups||!r.backups.length){alert('没有可用的备份文件');return;}
    let msg='选择要恢复的备份（输入序号）:\n\n';
    r.backups.forEach((b,i)=>{msg+=`${i+1}. ${b.name} (${b.date})\n`;});
    const choice=prompt(msg);if(!choice)return;
    const idx=parseInt(choice)-1;if(idx<0||idx>=r.backups.length){alert('无效选择');return;}
    if(!confirm(`确定恢复备份「${r.backups[idx].name}」？\n当前文件会被覆盖。`))return;
    const rr=JSON.parse(await window.pywebview.api.restore_backup(r.backups[idx].path));
    if(rr.ok){alert('恢复成功！将重新加载书签。');autoLoad();}else alert('恢复失败:'+rr.error);
  }catch(e){alert('操作失败:'+e);}
}

// ═══════ 辅助 ═══════
function setStatus(t){document.getElementById('statusText').textContent=t;}
function refreshCounts(){if(safariData){const b=countBookmarks(safariData);document.getElementById('safariCount').textContent=`${b}条,${countFolders(safariData)}文件夹`;document.getElementById('safariBadge').textContent=`${b}条`;}if(edgeData){const b=countBookmarks(edgeData);document.getElementById('edgeCount').textContent=`${b}条,${countFolders(edgeData)}文件夹`;document.getElementById('edgeBadge').textContent=`${b}条`;}}
function refreshAll(){setDirty(true);refreshCounts();if(diffResult)doCompare();else refreshUI();}

// ═══════ PyWebView 桥接 ═══════
function getIsPywebview(){return typeof window.pywebview!=='undefined'&&window.pywebview.api&&window.pywebview.api.load_edge;}

async function autoLoad(){
  if(!getIsPywebview())return;setStatus('⏳ 正在加载...');
  // 先加载映射
  try{const mr=await window.pywebview.api.load_mapping();const mp=JSON.parse(mr);if(mp.ok&&mp.data){folderMapping=mp.data;console.log('映射已恢复:',folderMapping);}}catch(e){console.error(e);}
  // Safari
  try{const sr=await window.pywebview.api.load_safari();const p=JSON.parse(sr);if(p.error)document.getElementById('safariLabel').textContent='❌ '+p.error.split('。')[0];else if(p.data){safariData=convertSafariNode(p.data,'');const b=countBookmarks(safariData);document.getElementById('safariCount').textContent=`${b}条,${countFolders(safariData)}文件夹`;document.getElementById('dropSafari').classList.add('loaded');document.getElementById('safariBadge').textContent=`${b}条`;document.getElementById('safariLabel').textContent='✅ Safari已加载';}}catch(e){document.getElementById('safariLabel').textContent='❌ '+e.message;}
  // Edge
  try{const er=await window.pywebview.api.load_edge();const p=JSON.parse(er);if(p.error)document.getElementById('edgeLabel').textContent='❌ '+p.error;else if(p.data){const r=parseEdgeJSON(JSON.stringify(p.data));edgeData=r.root;edgeRaw=p.data;const b=countBookmarks(edgeData);document.getElementById('edgeCount').textContent=`${b}条,${countFolders(edgeData)}文件夹`;document.getElementById('dropEdge').classList.add('loaded');document.getElementById('edgeBadge').textContent=`${b}条`;document.getElementById('edgeLabel').textContent='✅ Edge已加载';}}catch(e){document.getElementById('edgeLabel').textContent='❌ '+e.message;}
  refreshUI();
  if(safariData&&edgeData){doCompare();setStatus('✅ 自动加载并对比完成'+(Object.keys(folderMapping).length?` | 映射${Object.keys(folderMapping).length}条`:''));}
  setDirty(false);
}
function waitForApi(){if(getIsPywebview())autoLoad();else setTimeout(waitForApi,200);}
setTimeout(waitForApi,300);

// 关闭时未保存提醒
window.addEventListener('beforeunload',function(e){if(dirty){e.preventDefault();e.returnValue='';}});

// ═══════ 关于 & 更新 ═══════
const GITHUB_REPO = 'https://github.com/tmzhouwenjie/BookmarkSync';
const APP_VERSION = '1.0.0';

function showAbout(){
  document.getElementById('aboutModal').classList.add('active');
}
function cmpVer(a,b){const pa=a.split('.').map(Number),pb=b.split('.').map(Number);for(let i=0;i<Math.max(pa.length,pb.length);i++){const x=pa[i]||0,y=pb[i]||0;if(x>y)return 1;if(x<y)return-1;}return 0;}
async function checkUpdate(){
  if(!getIsPywebview()){window.open(GITHUB_REPO+'/releases','_blank');return;}
  setStatus('🔄 正在检查更新...');
  let r;
  try{r=JSON.parse(await window.pywebview.api.check_github_update());}catch(e){alert('检查更新失败: '+e);setStatus('❌ 检查更新失败');return;}
  if(r.error){alert('检查更新失败: '+r.error);setStatus('❌ 检查更新失败');return;}
  if(cmpVer(r.current_version,r.latest_version)>=0){
    alert('当前已是最新版本 v'+r.current_version);
    setStatus('✅ 已是最新版本 v'+r.current_version);return;
  }
  if(!r.download_url){
    if(confirm('发现新版本 v'+r.latest_version+'，但未找到安装包。\n打开 GitHub Releases 页面？'))
      window.pywebview.api.open_url(GITHUB_REPO+'/releases');
    return;
  }
  if(!confirm(`发现新版本 v${r.latest_version}（当前 v${r.current_version}）\n\n${r.notes||''}\n\n点击下载并安装？`))return;
  // 开始下载
  try{await window.pywebview.api.download_update(r.download_url);}catch(e){alert('下载失败: '+e);return;}
  setStatus('⬇️ 正在下载更新...');
  // 轮询进度
  await new Promise(resolve=>{
    const iv=setInterval(async()=>{
      try{
        const p=JSON.parse(await window.pywebview.api.get_update_progress());
        if(p.progress>=100||p.progress<0){clearInterval(iv);resolve();}
        else setStatus(`⬇️ 正在下载更新... ${p.progress}%`);
      }catch{clearInterval(iv);resolve();}
    },400);
  });
  const fp=JSON.parse(await window.pywebview.api.get_update_progress());
  if(fp.progress<0){alert('下载失败，请重试');setStatus('❌ 下载失败');return;}
  // 安装
  setStatus('📦 正在安装更新...');
  let ir;
  try{ir=JSON.parse(await window.pywebview.api.install_update());}catch(e){alert('安装失败: '+e);return;}
  if(ir.ok){
    alert(`更新安装成功！已升级到 v${r.latest_version}\n请重启应用以使用新版本。`);
    setStatus('✅ 更新已安装，请重启应用');
  }else alert('安装失败: '+(ir.error||'未知错误'));
}
